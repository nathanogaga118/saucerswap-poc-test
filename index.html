
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<script src="https://unpkg.com/@hiero-ledger/sdk@2.70.0/dist/umd.js"></script>
</head>
<body>
<h1>SaucerSwap Wallet — signTransaction() Display Accuracy Test</h1>

<p>Sender: <input id="senderId" value="0.0.10190152"></p>
<p>Recipient (different account): <input id="recipientId" value="0.0.10130162"></p>
<p>Amount (tinybars): <input id="tinybars" value="100000"></p>

<button onclick="testSignTransaction()">Test Sign Transaction (asymmetric transfer)</button>
<pre id="log"></pre>
<script>
function log(msg) {
  document.getElementById('log').textContent += new Date().toISOString() + " - " + msg + "\n";
}
async function testSignTransaction() {
  try {
    const { TransferTransaction, AccountId, Hbar, TransactionId } = sdk;
    const senderStr = document.getElementById('senderId').value.trim();
    const recipientStr = document.getElementById('recipientId').value.trim();
    const tinybars = parseInt(document.getElementById('tinybars').value.trim(), 10);

    const senderAcct = AccountId.fromString(senderStr);
    const recipientAcct = AccountId.fromString(recipientStr);

    log("Building test transaction: " + senderStr + " -> " + recipientStr + ", " + tinybars + " tinybar(s)...");
    const tx = new TransferTransaction()
      .addHbarTransfer(senderAcct, Hbar.fromTinybars(-tinybars))
      .addHbarTransfer(recipientAcct, Hbar.fromTinybars(tinybars))
      .setTransactionId(TransactionId.generate(senderAcct))
      .setNodeAccountIds([AccountId.fromString("0.0.3")]) // a real testnet/mainnet node id, required to freeze without a Client
      .freeze();
    const bytes = tx.toBytes();
    const base64Bytes = btoa(String.fromCharCode(...bytes));
    log("Built transaction bytes (base64), length: " + base64Bytes.length);
    log("Calling window.saucerswapWallet.signTransaction()...");
    if (!window.saucerswapWallet) {
      log("saucerswapWallet not found on window.");
      return;
    }
    window.saucerswapWallet.signTransaction(base64Bytes)
      .then(result => log("signTransaction() resolved: " + JSON.stringify(result)))
      .catch(err => log("signTransaction() rejected: " + err.message));
  } catch (e) {
    log("Error building/sending transaction: " + e.message);
    console.error(e);
  }
}
</script>
</body>
</html>
