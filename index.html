<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>SaucerSwap Allowance Display PoC</title>
<script src="https://unpkg.com/@hashgraph/sdk@2.53.0/dist/hashgraph-sdk.js"></script>
<script src="https://unpkg.com/@walletconnect/sign-client@2.11.2/dist/index.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
  body { font-family: system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; }
  button { padding: 10px 16px; margin: 6px 6px 6px 0; cursor: pointer; }
  #qrcode { margin: 16px 0; }
  #log { white-space: pre-wrap; background: #111; color: #0f0; padding: 12px; border-radius: 6px; font-size: 12px; max-height: 300px; overflow-y: auto; }
  input { padding: 6px; width: 100%; box-sizing: border-box; margin: 4px 0; }
  label { font-size: 13px; font-weight: bold; }
</style>
</head>
<body>

<h2>SaucerSwap AccountAllowanceApproveTransaction PoC</h2>
<p>Authorized security research — Hedera <b>testnet</b> only. This builds an allowance approval with a near-INT64_MAX amount to inspect how the SaucerSwap wallet displays it on the signing screen.</p>

<label>Owner Account ID (your test wallet, e.g. 0.0.xxxxx)</label>
<input id="ownerId" placeholder="0.0.10190152" value="0.0.10190152" />

<label>Spender Account ID (the "approved" account)</label>
<input id="spenderId" placeholder="0.0.xxxxx" />

<label>Token ID (leave blank to test HBAR allowance instead)</label>
<input id="tokenId" placeholder="0.0.xxxxx (optional)" />

<label>Approval Amount (default = INT64_MAX, i.e. effectively unlimited)</label>
<input id="amount" value="9223372036854775807" />

<div>
  <button id="btnConnect">1. Connect Wallet (WalletConnect)</button>
  <button id="btnSend" disabled>2. Build & Send Allowance Approval</button>
</div>

<div id="qrcode"></div>
<pre id="log">Waiting...</pre>

<script>
const logEl = document.getElementById('log');
function log(...args) {
  logEl.textContent += '\n' + args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : a).join(' ');
  logEl.scrollTop = logEl.scrollHeight;
  console.log(...args);
}

const PROJECT_ID = 'REPLACE_WITH_YOUR_WALLETCONNECT_PROJECT_ID'; // get one free at cloud.walletconnect.com
const HEDERA_TESTNET_CHAIN = 'hedera:testnet';

let signClient;
let session;

async function initWalletConnect() {
  signClient = await window.SignClient.init({
    projectId: PROJECT_ID,
    metadata: {
      name: 'SaucerSwap Allowance Display PoC',
      description: 'Security research test harness',
      url: window.location.origin,
      icons: []
    }
  });
  log('WalletConnect SignClient initialized.');
}

document.getElementById('btnConnect').addEventListener('click', async () => {
  try {
    if (!signClient) await initWalletConnect();

    const { uri, approval } = await signClient.connect({
      requiredNamespaces: {
        hedera: {
          methods: ['hedera_signTransaction', 'hedera_signAndExecuteTransaction'],
          chains: [HEDERA_TESTNET_CHAIN],
          events: []
        }
      }
    });

    if (uri) {
      // Render QR code for scanning with the SaucerSwap mobile app,
      // and also log the raw wc: URI in case you want to open it directly
      // (e.g. via adb intent) on a connected test device.
      QRCode.toCanvas(document.createElement('canvas'), uri, (err, canvas) => {
        if (!err) {
          document.getElementById('qrcode').innerHTML = '';
          document.getElementById('qrcode').appendChild(canvas);
        }
      });
      log('WalletConnect URI (scan or open on device):', uri);
    }

    session = await approval();
    log('Session approved:', session.namespaces);
    document.getElementById('btnSend').disabled = false;
    document.getElementById('qrcode').innerHTML = '';
  } catch (err) {
    log('Connect error:', err.message || err);
  }
});

document.getElementById('btnSend').addEventListener('click', async () => {
  try {
    const ownerId = document.getElementById('ownerId').value.trim();
    const spenderId = document.getElementById('spenderId').value.trim();
    const tokenId = document.getElementById('tokenId').value.trim();
    const amount = document.getElementById('amount').value.trim();

    if (!ownerId || !spenderId) {
      log('Owner and Spender account IDs are required.');
      return;
    }

    const { AccountAllowanceApproveTransaction, AccountId, TokenId, Hbar, TransactionId } = window.HashgraphSdk;

    const tx = new AccountAllowanceApproveTransaction();

    if (tokenId) {
      // Token allowance path — mirrors the ERC20 "unlimited approval" pattern
      tx.approveTokenAllowance(
        TokenId.fromString(tokenId),
        AccountId.fromString(ownerId),
        AccountId.fromString(spenderId),
        BigInt(amount)
      );
      log('Building TOKEN allowance approval:', { tokenId, ownerId, spenderId, amount });
    } else {
      // HBAR allowance path
      tx.approveHbarAllowance(
        AccountId.fromString(ownerId),
        AccountId.fromString(spenderId),
        Hbar.fromTinybars(amount)
      );
      log('Building HBAR allowance approval:', { ownerId, spenderId, amountTinybars: amount });
    }

    tx.setTransactionId(TransactionId.generate(AccountId.fromString(ownerId)));
    tx.setNodeAccountIds([new AccountId(3)]); // testnet node 0.0.3
    tx.freeze();

    const txBytes = tx.toBytes();
    const txBase64 = btoa(String.fromCharCode(...txBytes));

    log('Transaction built. Sending hedera_signTransaction request to wallet...');

    const result = await signClient.request({
      topic: session.topic,
      chainId: HEDERA_TESTNET_CHAIN,
      request: {
        method: 'hedera_signTransaction',
        params: {
          signerAccountId: `hedera:testnet:${ownerId}`,
          transactionBody: txBase64
        }
      }
    });

    log('Wallet responded:', result);
    log('---');
    log('NOW CHECK: What did the SaucerSwap confirmation screen show?');
    log('- Was the amount displayed as a raw huge number with no warning?');
    log('- Was there any "unlimited" / high-risk indicator?');
    log('- Screenshot the signing screen for your report.');

  } catch (err) {
    log('Send error:', err.message || err);
  }
});
</script>

</body>
</html>
