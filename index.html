<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<script src="https://unpkg.com/@hiero-ledger/sdk@2.70.0/dist/umd.js"></script>
</head>
<body>
<h1>SaucerSwap Wallet — Allowance Amount Display PoC</h1>
<p>Confirms whether the wallet's approval confirmation screen visually distinguishes
a normal-sized allowance from a near-max ("unlimited") one.</p>

<p>Owner: <input id="ownerId" value="0.0.10190152"></p>
<p>Spender: <input id="spenderId" value="0.0.10130162"></p>
<p>Token (HTS token id, leave blank for HBAR): <input id="tokenId" value=""></p>

<button onclick="approve('normal')">1. Approve NORMAL amount (100 units)</button><br><br>
<button onclick="approve('max')">2. Approve MAX_INT64 amount</button>

<pre id="log"></pre>
<script>
function log(msg) {
  document.getElementById('log').textContent += new Date().toISOString() + " - " + msg + "\n";
}

// int64 max = 9223372036854775807
const MAX_INT64 = "9223372036854775807";

async function approve(mode) {
  try {
    const { AccountAllowanceApproveTransaction, AccountId, TokenId, Hbar, TransactionId } = sdk;
    const ownerStr = document.getElementById('ownerId').value.trim();
    const spenderStr = document.getElementById('spenderId').value.trim();
    const tokenStr = document.getElementById('tokenId').value.trim();

    const owner = AccountId.fromString(ownerStr);
    const spender = AccountId.fromString(spenderStr);

    const tx = new AccountAllowanceApproveTransaction();

    if (tokenStr) {
      const tokenId = TokenId.fromString(tokenStr);
      const amount = mode === 'max' ? MAX_INT64 : "100";
      log("Building TOKEN allowance: owner=" + ownerStr + " spender=" + spenderStr +
          " token=" + tokenStr + " amount=" + amount + " (" + mode + ")");
      tx.approveTokenAllowance(tokenId, owner, spender, amount);
    } else {
      // HBAR is denominated in tinybars; MAX_INT64 tinybars for the "unlimited" case
      const amount = mode === 'max' ? Hbar.fromTinybars(MAX_INT64) : Hbar.fromTinybars("10000000000"); // 100 HBAR
      log("Building HBAR allowance: owner=" + ownerStr + " spender=" + spenderStr +
          " amount(tinybars)=" + amount.toTinybars().toString() + " (" + mode + ")");
      tx.approveHbarAllowance(owner, spender, amount);
    }

    tx.setTransactionId(TransactionId.generate(owner))
      .setNodeAccountIds([AccountId.fromString("0.0.3")])
      .freeze();

    const bytes = tx.toBytes();
    const base64Bytes = btoa(String.fromCharCode(...bytes));
    log("Built approval tx bytes (base64), length: " + base64Bytes.length);

    if (!window.saucerswapWallet) {
      log("ERROR: window.saucerswapWallet not found. Confirm the injected object name in this wallet's dApp browser first.");
      return;
    }

    log("Calling signTransaction() — TAKE A SCREENSHOT of the wallet's confirmation screen now.");
    window.saucerswapWallet.signTransaction(base64Bytes)
      .then(result => log("signTransaction() resolved: " + JSON.stringify(result)))
      .catch(err => log("signTransaction() rejected/cancelled: " + err.message));
  } catch (e) {
    log("Error: " + e.message);
    console.error(e);
  }
}
</script>
</body>
</html>
